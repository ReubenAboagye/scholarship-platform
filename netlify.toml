[build]
  command   = "pnpm run build"
  publish   = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION            = "20"
  SECRETS_SCAN_OMIT_KEYS  = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_APP_NAME,OPENROUTER_MODEL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all auth callbacks properly
[[redirects]]
  from   = "/auth/callback"
  to     = "/auth/callback"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
